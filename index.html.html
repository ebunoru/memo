<style>
html,body{margin:0;padding:0;background:#f0e8d6;}
      @import url('https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Shippori+Mincho:wght@600;700&display=swap');

      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

      .tm-root {
        --paper: #f6f1e4; --paper-2: #fbf8ef; --ink: #2b2a33; --ink-soft: #5a5750;
        --rule: #d8cdb3; --red: #b5402f; --red-soft: #c96a56; --blue: #2f4a6b;
        --gold: #b8893b; --shadow: rgba(60,45,20,0.18);
        font-family: 'Zen Kaku Gothic New', sans-serif; color: var(--ink);
        background: radial-gradient(circle at 20% 10%, #efe7d3 0%, transparent 55%),
          radial-gradient(circle at 90% 90%, #efe6cf 0%, transparent 50%), #f0e8d6;
        min-height: 100vh; width: 100%; line-height: 1.7; -webkit-font-smoothing: antialiased;
      }
      .tm-center { display:flex; align-items:center; justify-content:center; min-height:100vh; }
      .tm-spinner { width:34px; height:34px; border-radius:50%; border:3px solid var(--rule); border-top-color: var(--red); animation: tm-spin .8s linear infinite; }
      @keyframes tm-spin { to { transform: rotate(360deg); } }
      .tm-page { max-width: 640px; margin: 0 auto; padding: 22px 18px 60px; }

      .tm-head { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 20px; }
      .tm-logo { font-family:'Klee One',cursive; font-weight:600; font-size:30px; margin:0; letter-spacing:.02em; }
      .tm-sub { margin:2px 0 0; font-size:13px; color: var(--ink-soft); }
      .tm-streak { text-align:center; background: var(--ink); color: var(--paper-2); border-radius:14px; padding:8px 14px; line-height:1.1; box-shadow: 0 4px 12px var(--shadow); }
      .tm-streak-num { font-size:22px; font-weight:700; font-family:'Klee One',cursive; display:block; }
      .tm-streak-label { font-size:10px; opacity:.8; letter-spacing:.1em; }

      .tm-due-card { background: linear-gradient(155deg,#34507a,#233a5c); color:#f6f1e4; border-radius:20px; padding:22px 22px 24px; box-shadow:0 10px 26px rgba(35,58,92,.35); position:relative; overflow:hidden; margin-bottom:16px; }
      .tm-due-card::after { content:''; position:absolute; right:-30px; top:-30px; width:140px; height:140px; background: radial-gradient(circle, rgba(255,255,255,.12), transparent 70%); }
      .tm-due-kicker { font-size:12px; letter-spacing:.15em; opacity:.85; }
      .tm-due-count { font-size:24px; margin:4px 0 16px; font-weight:500; }
      .tm-due-count strong { font-size:34px; font-family:'Klee One',cursive; color:#ffd98a; margin-right:4px; }
      .tm-due-empty { font-size:14px; opacity:.9; margin:6px 0 0; }

      .tm-btn-primary { width:100%; border:none; cursor:pointer; background: var(--red); color:#fff7ec; font-family:'Zen Kaku Gothic New',sans-serif; font-weight:700; font-size:16px; padding:15px; border-radius:14px; letter-spacing:.03em; box-shadow:0 6px 16px rgba(181,64,47,.4); transition: transform .12s ease, box-shadow .12s ease; }
      .tm-btn-primary:active { transform: translateY(2px); box-shadow:0 3px 8px rgba(181,64,47,.4); }
      .tm-mt { margin-top:18px; }

      .tm-stats { display:grid; grid-template-columns: repeat(3,1fr); gap:10px; margin-bottom:26px; }
      .tm-stat { background: var(--paper-2); border:1px solid var(--rule); border-radius:14px; padding:12px 8px; text-align:center; box-shadow:0 2px 6px rgba(60,45,20,.06); }
      .tm-stat-val { font-size:22px; font-weight:700; font-family:'Klee One',cursive; color: var(--blue); }
      .tm-stat-lab { font-size:11px; color: var(--ink-soft); margin-top:2px; }

      .tm-list-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
      .tm-list-head h3 { font-family:'Shippori Mincho',serif; font-size:18px; margin:0; border-left:4px solid var(--red); padding-left:10px; }
      .tm-add { background:none; border:1.5px solid var(--ink); color: var(--ink); border-radius:999px; padding:6px 14px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; }
      .tm-add:active { background: var(--ink); color: var(--paper); }

      .tm-empty { text-align:center; padding:30px 16px; color: var(--ink-soft); }
      .tm-empty-sub { font-size:13px; }

      .tm-cards { display:flex; flex-direction:column; gap:16px; }
      .tm-memo { position:relative; background: var(--paper-2); border:1px solid var(--rule); border-radius:4px 4px 10px 10px; padding:22px 16px 14px; padding-right:64px; box-shadow:0 4px 14px var(--shadow); background-image: repeating-linear-gradient(var(--paper-2) 0 30px, var(--rule) 30px 31px); background-position:0 8px; }
      .tm-memo.is-due { box-shadow:0 4px 14px var(--shadow), 0 0 0 2px var(--red-soft); }
      .tm-memo-body { cursor:pointer; }
      .tm-spiral { position:absolute; top:-9px; left:14px; right:14px; display:flex; justify-content:space-between; }
      .tm-ring { width:13px; height:18px; border:2.5px solid #9a937f; border-radius:50%; border-bottom-color:transparent; border-right-color:#8a836f; background: linear-gradient(#cfc6ad,#b3aa90); transform: rotate(8deg); }
      .tm-spiral-wide { left:20px; right:20px; top:-10px; }
      .tm-memo-meta { display:flex; align-items:center; gap:8px; margin-bottom:4px; flex-wrap:wrap; }
      .tm-chip { background: var(--blue); color:#f3eddd; font-size:11px; font-weight:500; padding:2px 9px; border-radius:999px; letter-spacing:.04em; }
      .tm-chip-center { display:inline-block; margin:0 auto 4px; }
      .tm-when { font-size:11.5px; color: var(--ink-soft); }
      .tm-when.due { color: var(--red); font-weight:700; }
      .tm-memo-title { font-family:'Klee One',cursive; font-weight:600; font-size:22px; margin:2px 0 8px; text-decoration:underline; text-decoration-color: var(--gold); text-underline-offset:4px; text-decoration-thickness:2px; }
      .tm-q-preview { margin:0; padding-left:18px; }
      .tm-q-preview li { font-size:14px; color: var(--ink-soft); margin-bottom:2px; }
      .tm-q-preview li::marker { color: var(--red); }
      .tm-more { list-style:none; margin-left:-18px; font-size:12px!important; font-style:italic; }
      .tm-level { display:flex; gap:5px; margin-top:10px; }
      .tm-dot { width:7px; height:7px; border-radius:50%; background: var(--rule); }
      .tm-dot.on { background: var(--gold); }
      .tm-memo-recall { position:absolute; right:12px; top:50%; transform:translateY(-50%); background: var(--red); color:#fff7ec; border:none; cursor:pointer; writing-mode: vertical-rl; padding:10px 7px; border-radius:8px; font-size:14px; font-weight:700; letter-spacing:.15em; font-family:inherit; box-shadow:0 3px 8px rgba(181,64,47,.35); }
      .tm-memo-recall:active { transform: translateY(-50%) scale(.95); }
      .tm-footnote { margin-top:28px; font-size:12px; color: var(--ink-soft); text-align:center; line-height:1.8; padding:0 10px; }

      .tm-editor-head, .tm-recall-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; gap:12px; }
      .tm-editor-title { font-family:'Shippori Mincho',serif; font-size:16px; font-weight:600; }
      .tm-link { background:none; border:none; color: var(--blue); font-size:14px; cursor:pointer; font-family:inherit; font-weight:500; }
      .tm-save { background: var(--ink); color: var(--paper-2); border:none; cursor:pointer; padding:7px 18px; border-radius:999px; font-size:14px; font-weight:700; font-family:inherit; }
      .tm-save:disabled { opacity:.35; }
      .tm-save-full { width:100%; padding:13px; border-radius:12px; margin-top:8px; }

      .tm-form { display:flex; flex-direction:column; gap:16px; }
      .tm-field { display:flex; flex-direction:column; gap:6px; }
      .tm-label { font-size:13px; font-weight:700; color: var(--ink-soft); }
      .tm-input, .tm-textarea { width:100%; font-family:inherit; font-size:15px; color: var(--ink); background: var(--paper-2); border:1px solid var(--rule); border-radius:10px; padding:12px; outline:none; line-height:1.7; }
      .tm-input:focus, .tm-textarea:focus { border-color: var(--blue); box-shadow:0 0 0 3px rgba(47,74,107,.12); }
      .tm-input-title { font-family:'Klee One',cursive; font-size:19px; font-weight:600; }
      .tm-textarea { resize: vertical; }
      .tm-bulk { background: linear-gradient(160deg,#fffdf6,#f6efdc); border:1.5px solid var(--gold); border-radius:14px; padding:16px; box-shadow:0 4px 14px rgba(184,137,59,.18); }
      .tm-bulk-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }

<body>
<div class="tm-root" id="app"></div>
<script>

(function(){
  'use strict';
  var KEY='trigger-memo-pwa-v1';
  var INTERVALS=[0,1,2,4,8,16,32];
  var MAX_LEVEL=INTERVALS.length-1;

  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function addDays(dateStr,n){ var d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
  function isDueDate(date){ return !date || date<=todayStr(); }
  function isDueQ(q){ return isDueDate(q.nextReview); }
  function memoDue(m){ return m.questions.some(isDueQ); }
  function fmtJP(dateStr){ if(!dateStr) return ''; var d=new Date(dateStr+'T00:00:00'); return (d.getMonth()+1)+'/'+d.getDate(); }
  function earliestNext(m){ var a=m.questions.map(function(q){return q.nextReview;}).filter(Boolean).sort(); return a[0]||todayStr(); }
  function memoLevel(m){ if(!m.questions.length) return 0; return Math.min.apply(null,m.questions.map(function(q){return q.level||0;})); }
  function dueLabel(date){ var t=todayStr(); if(isDueDate(date)) return '今すぐ'; if(date===addDays(t,1)) return '明日'; var diff=Math.round((new Date(date)-new Date(t))/86400000); return diff+'日後'; }
  function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
  function nextSchedule(level,grade){
    if(grade==='good'){ var l=Math.min((level||0)+1,MAX_LEVEL); return {level:l,nextReview:addDays(todayStr(),INTERVALS[l])}; }
    if(grade==='vague'){ return {level:level||0,nextReview:addDays(todayStr(),1)}; }
    return {level:0,nextReview:todayStr()};
  }
  function parseTokens(text){
    var parts=[]; text=text||''; var re=/\*\*([\s\S]+?)\*\*/g; var last=0; var m;
    while((m=re.exec(text))){ if(m.index>last) parts.push({type:'text',value:text.slice(last,m.index)}); parts.push({type:'bold',value:m[1]}); last=m.index+m[0].length; }
    if(last<text.length) parts.push({type:'text',value:text.slice(last)});
    return parts;
  }
  function countBlanks(text){ return parseTokens(text).filter(function(t){return t.type==='bold';}).length; }

  function autoParse(raw){
    var text=String(raw||'').replace(/\r\n?/g,'\n');
    var lines=text.split('\n'); var preamble=[];
    function clean(s){
      return s.replace(/^#{1,6}\s*/,'')
        .replace(/^\s*(?:[①-⑳]|[（(]\s*\d+\s*[）)]|第[一二三四五六七八九十\d]+[\.\．、)）]?|\d+\s*[\.\．、)）:：])\s*/,'')
        .replace(/^\*\*|\*\*$/g,'')
        .replace(/[:：]\s*$/,'')
        .trim();
    }
    function boundary(line){
      var l=line.trim(); if(!l) return null; if(/^>/.test(l)) return null; var m;
      if((m=l.match(/^#{1,6}\s+(.+)$/))) return clean(m[1]);
      if((m=l.match(/^(?:Q\s*\d*|問\s*\d*|問い)\s*[\.\):：、]\s*(.*)$/i))) return clean(m[1]||'');
      if(/[?？]$/.test(l) && !/^[\*\-•・]/.test(l) && l.length<=60) return clean(l);
      if(/^\*\*[^*]+\*\*[:：]?$/.test(l) && !/^[\*\-•・]/.test(l)) return clean(l);
      return null;
    }
    function stripA(l){ return l.replace(/^\s*(?:A\s*\d*|答え?|規範|解答)\s*[\.\):：、]\s*/i,''); }
    var items=[]; var cur=null;
    lines.forEach(function(line){
      var b=boundary(line);
      if(b!==null){ if(cur) items.push(cur); cur={q:b,aLines:[]}; }
      else if(cur){ cur.aLines.push(line); }
      else if(line.trim()){ preamble.push(line); }
    });
    if(cur) items.push(cur);
    function buildAnswer(aLines){
      var body=aLines.map(function(l){return l.replace(/^\s*>+\s?/,'');})
        .map(function(l){return l.replace(/^(\s*)[\*\-•]\s+/,'$1・');}).join('\n');
      body=stripA(body); body=body.replace(/\n{3,}/g,'\n\n').replace(/[ \t]+$/gm,'').trim();
      return body;
    }
    var questions=items.map(function(it){
      var q=it.q.trim(); var a=buildAnswer(it.aLines);
      if(q && !/[?？]$/.test(q)) q=q+'は？';
      return {q:q,a:a};
    }).filter(function(x){return x.q||x.a;});
    if(questions.length===0){
      var paras=text.split(/\n\s*\n/).map(function(p){return p.trim();}).filter(Boolean);
      questions=paras.map(function(p){return {q:'',a:buildAnswer(p.split('\n'))};});
    }
    var whole=preamble.join('\n')+'\n'+text; var title=''; var tag='';
    var br=whole.match(/【([^】]+)】/); if(br) title=br[1].trim();
    var art=whole.match(/(?:民法|刑法|刑事訴訟法|刑訴|民事訴訟法|民訴|会社法|商法|憲法|行政法)?\s*第?\s*\d+\s*条(?:の\d+)?(?:\s*\d+\s*項)?/);
    if(!title && art) title=art[0].replace(/\s+/g,'');
    var law=whole.match(/民法|刑事訴訟法|刑訴|刑法|民事訴訟法|民訴|会社法|商法|憲法|行政法/);
    if(law) tag = law[0]==='刑事訴訟法'?'刑訴':(law[0]==='民事訴訟法'?'民訴':law[0]);
    return {title:title,tag:tag,questions:questions};
  }

  function seedMemos(){
    function mk(arr){ return arr.map(function(q){ q.id=uid(); q.level=0; q.nextReview=todayStr(); q.history=[]; return q; }); }
    return [
      { id:uid(), title:'訴因の特定（刑訴256条3項）', tag:'刑訴', createdAt:todayStr(), questions: mk([
        {q:'256条3項で訴因の特定が要求される趣旨と、そこから導かれる特定の程度は？', a:'訴因の特定が要求される趣旨は、裁判所に対して**審判対象を明確にする**とともに、被告人の**防御の範囲を示す**点にある。\nもっとも、訴因は第一次的には審判対象を明確にする点に趣旨があり、被告人の防御は釈明等その後の手続で柔軟に対応すれば足りる。\nしたがって、**他の犯罪事実との識別が可能な程度に特定**されていれば足りる。'},
        {q:'概括的記載が許容されるための一般規範（特殊事情＋2要件）は？', a:'犯罪の種類・性質等により証拠で明らかにし得る事実に限界があるなどの**特殊事情**のため概括的記載にとどめざるを得なかった場合でも、\n①被告人の行為が当該犯罪の**構成要件に該当すると認識でき**、\n②**他の犯罪事実と区別される程度に特定**されていれば、\n検察官が起訴当時の証拠に基づきできる限り特定した以上、訴因の特定に欠けるところはない。'},
        {q:'覚せい剤自己使用罪・複数回の使用が疑われ「ない」場合の処理は？', a:'直ちに他の犯罪事実との**識別が問題となることはなく**、訴因の特定に欠けるところはない。'},
        {q:'覚せい剤自己使用罪・複数回の使用が疑われる場合の処理は？', a:'正面から他の犯罪事実との識別が問題となる。\nこの場合、検察官が当該幅のある日時において**「最終の1回の行為」を起訴した趣旨である旨、釈明**することによって特定を補充することを要する。\nこの釈明があれば、訴因の特定に欠けるところはない。'}
      ])},
      { id:uid(), title:'民法94条2項', tag:'民法', createdAt:todayStr(), questions: mk([
        {q:'94条2項の趣旨は？', a:'虚偽の外観を信頼した第三者を保護する規定。真の権利者に**帰責性**がある以上、外観を信頼した**善意の第三者**を保護し、**取引の安全**を図るべきという**権利外観法理**の現れ。'},
        {q:'その要件は？', a:'①**虚偽の外観の存在**\n②真の権利者の**帰責性**（外観作出への意思的関与）\n③第三者が**善意**であること（通説は無過失まで不要）\n④**第三者**にあたること（当事者・包括承継人以外で、新たに独立の法律上の利害関係を有する者）。'},
        {q:'94条2項の類推適用の要件は？', a:'①虚偽の外観の存在　②本人の**帰責性**（作出・承認・放置）　③第三者の信頼。\n意思外形対応型は**善意**で足りるが、意思外形非対応型は**110条併用**で**善意無過失**を要する。'},
        {q:'具体例は？', a:'AがB名義の不実の登記を作出・放置 → Bが**善意のC**に売却 → Cは**94条2項類推適用**で保護され、AはCに所有権を対抗できない。'}
      ])}
    ];
  }
  function defaultData(){ return {memos:seedMemos(), stats:{totalRecalls:0,totalGood:0,lastStudyDate:null,streak:0}}; }
  function migrate(data){
    if(!data||!data.memos) return defaultData();
    data.memos=data.memos.map(function(m){
      m.questions=(m.questions||[]).map(function(q){
        if(q.level==null) q.level=(m.level||0);
        if(q.nextReview==null) q.nextReview=(m.nextReview||todayStr());
        if(q.history==null) q.history=[];
        return q;
      });
      return m;
    });
    if(!data.stats) data.stats={totalRecalls:0,totalGood:0,lastStudyDate:null,streak:0};
    return data;
  }

  var DATA;
  function load(){ try{ var r=localStorage.getItem(KEY); DATA = r?migrate(JSON.parse(r)):defaultData(); }catch(e){ DATA=defaultData(); } }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(DATA)); }catch(e){} }

  function saveMemo(memo){
    var exists=DATA.memos.some(function(m){return m.id===memo.id;});
    if(exists){
      DATA.memos=DATA.memos.map(function(m){ return m.id===memo.id ? {id:m.id,createdAt:m.createdAt,title:memo.title,tag:memo.tag,questions:memo.questions} : m; });
    } else {
      memo.createdAt=todayStr();
      DATA.memos.unshift(memo);
    }
    save();
  }
  function deleteMemo(id){ DATA.memos=DATA.memos.filter(function(m){return m.id!==id;}); save(); }
  function gradeQuestion(memoId,qId,grade){
    DATA.memos.forEach(function(m){
      if(m.id!==memoId) return;
      m.questions.forEach(function(q){
        if(q.id!==qId) return;
        var s=nextSchedule(q.level,grade); q.level=s.level; q.nextReview=s.nextReview;
        q.history=[{date:todayStr(),grade:grade}].concat(q.history||[]).slice(0,40);
      });
    });
    var st=DATA.stats; st.totalRecalls+=1; if(grade==='good') st.totalGood+=1;
    var t=todayStr();
    if(st.lastStudyDate!==t){ st.streak = (st.lastStudyDate===addDays(t,-1)) ? st.streak+1 : 1; st.lastStudyDate=t; }
    save();
  }

  // ---- DOM helpers ----
  function el(tag,attrs,children){
    var e=document.createElement(tag); attrs=attrs||{};
    for(var k in attrs){ var v=attrs[k]; if(v==null) continue;
      if(k==='class') e.className=v;
      else if(k==='text') e.textContent=v;
      else if(k.slice(0,2)==='on' && typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(),v);
      else if(k==='value') e.value=v;
      else if(k==='disabled'){ if(v) e.setAttribute('disabled',''); }
      else e.setAttribute(k,v);
    }
    if(children!=null) appendC(e,children);
    return e;
  }
  function appendC(parent,c){
    if(c==null||c===false) return;
    if(Array.isArray(c)){ c.forEach(function(x){appendC(parent,x);}); return; }
    if(typeof c==='string'||typeof c==='number'){ parent.appendChild(document.createTextNode(String(c))); return; }
    parent.appendChild(c);
  }

  // ---- Editor ----
  function renderEditor(initial){
    var st={ title: initial?initial.title:'', tag: initial?initial.tag:'',
      qs: initial && initial.questions.length ? initial.questions.map(function(q){return {id:q.id,q:q.q,a:q.a,level:q.level,nextReview:q.nextReview,history:q.history};}) : [{id:uid(),q:'',a:''}],
      showBulk: !initial };
    var page=el('div',{'class':'tm-page'});
    function canSave(){ return st.title.trim() && st.qs.some(function(q){return q.q.trim();}); }
    var saveBtn;
    function refreshSave(){ if(saveBtn){ if(canSave()) saveBtn.removeAttribute('disabled'); else saveBtn.setAttribute('disabled',''); } }
    function doSave(){
      var cleaned=st.qs.filter(function(q){return q.q.trim();}).map(function(q){
        return {id:q.id||uid(), q:q.q.trim(), a:(q.a||'').trim(), level:q.level==null?0:q.level, nextReview:q.nextReview||todayStr(), history:q.history||[]};
      });
      if(!st.title.trim()||!cleaned.length) return;
      saveMemo({ id: initial?initial.id:uid(), title:st.title.trim(), tag:st.tag.trim(), questions:cleaned });
      renderHome();
    }
    saveBtn=el('button',{'class':'tm-save',onclick:doSave,text:'保存'});
    page.appendChild(el('header',{'class':'tm-editor-head'},[
      el('button',{'class':'tm-link',onclick:function(){ initial?renderDetail(initial.id):renderHome(); },text:'← 戻る'}),
      el('span',{'class':'tm-editor-title',text: initial?'論点を編集':'前夜の準備'}),
      saveBtn
    ]));
    var form=el('div',{'class':'tm-form'}); page.appendChild(form);

    var msgEl=el('div',{'class':'tm-split-msg',style:'display:none'});
    var titleInput, tagInput, qContainer;

    var bulkArea=el('textarea',{'class':'tm-textarea tm-bulk-area',rows:'7',placeholder:'ここに論証をそのまま貼り付け\n\n### 1. ○○の趣旨\n> …規範…\n\n### 2. △△の要件\n> …規範…'});
    var bulkWrap=el('div');
    function buildBulk(){
      clear(bulkWrap);
      if(st.showBulk){
        var box=el('div',{'class':'tm-bulk'});
        var head=el('div',{'class':'tm-bulk-head'},[ el('span',{'class':'tm-bulk-title',text:'📋 論証を貼り付けて自動作成'}) ]);
        if(initial) head.appendChild(el('button',{'class':'tm-link',onclick:function(){ st.showBulk=false; buildBulk(); },text:'閉じる'}));
        box.appendChild(head);
        var desc=el('p',{'class':'tm-bulk-desc'});
        appendC(desc,['見出し（', el('code',null,'###'),' や ', el('code',null,'1.'), '）や「〜は？」ごとに、問いと答えへ自動で分けます。', el('strong',null,'**太字**'), ' はそのまま穴埋めになります。']);
        box.appendChild(desc);
        box.appendChild(bulkArea);
        box.appendChild(el('button',{'class':'tm-split-btn',onclick:doSplit,text:'✨ 自動で問い・答えに分割する'}));
        bulkWrap.appendChild(box);
      } else {
        bulkWrap.appendChild(el('button',{'class':'tm-bulk-reopen',onclick:function(){ st.showBulk=true; buildBulk(); },text:'📋 文章を貼り付けて追加'}));
      }
    }
    function doSplit(){
      var raw=bulkArea.value;
      if(!raw.trim()) return;
      var parsed=autoParse(raw);
      if(!parsed.questions.length){ setMsg('× うまく分割できませんでした。見出し（### や 1.）や「〜は？」を手がかりにします。',true); return; }
      if(parsed.title && !st.title.trim()){ st.title=parsed.title; titleInput.value=parsed.title; }
      if(parsed.tag && !st.tag.trim()){ st.tag=parsed.tag; tagInput.value=parsed.tag; }
      var fresh=parsed.questions.map(function(q){ return {id:uid(),q:q.q,a:q.a,level:0,nextReview:todayStr(),history:[]}; });
      var allEmpty=st.qs.every(function(q){return !q.q.trim() && !q.a.trim();});
      st.qs = allEmpty ? fresh : st.qs.concat(fresh);
      var blanks=parsed.questions.reduce(function(n,q){return n+countBlanks(q.a);},0);
      setMsg('✓ '+parsed.questions.length+'問に分割しました'+(blanks?'（穴埋め '+blanks+' 箇所）':'')+'。下で確認・編集できます。',false);
      bulkArea.value=''; st.showBulk=false; buildBulk(); buildQuestions(); refreshSave();
    }
    function setMsg(text,err){ msgEl.textContent=text; msgEl.className='tm-split-msg'+(err?' err':''); msgEl.style.display=''; }

    form.appendChild(bulkWrap); buildBulk();
    form.appendChild(msgEl);

    titleInput=el('input',{'class':'tm-input tm-input-title',placeholder:'例）訴因の特定（刑訴256条3項）',value:st.title});
    titleInput.addEventListener('input',function(){ st.title=titleInput.value; refreshSave(); });
    form.appendChild(el('label',{'class':'tm-field'},[ el('span',{'class':'tm-label',text:'論点・条文'}), titleInput ]));

    tagInput=el('input',{'class':'tm-input',placeholder:'例）刑訴 / 民法',value:st.tag});
    tagInput.addEventListener('input',function(){ st.tag=tagInput.value; });
    form.appendChild(el('label',{'class':'tm-field'},[ el('span',{'class':'tm-label',text:'科目・分野（任意）'}), tagInput ]));

    var hint=el('div',{'class':'tm-hint-box'});
    appendC(hint,['自動分割した内容は下でそのまま編集できます。覚えたい語を ', el('code',null,'**…**'), ' で囲むと', el('strong',null,'穴埋め'), 'になります。']);
    form.appendChild(hint);

    qContainer=el('div'); form.appendChild(qContainer);
    function buildQuestions(){
      clear(qContainer);
      st.qs.forEach(function(q,idx){
        var card=el('div',{'class':'tm-qedit'});
        var headRow=el('div',{'class':'tm-qedit-head'},[ el('span',{'class':'tm-qnum',text:'問 '+(idx+1)}) ]);
        if(st.qs.length>1) headRow.appendChild(el('button',{'class':'tm-remove',onclick:function(){ st.qs.splice(idx,1); buildQuestions(); refreshSave(); },text:'削除'}));
        card.appendChild(headRow);
        var qi=el('input',{'class':'tm-input',placeholder:'問い（例：256条3項の趣旨と特定の程度は？）',value:q.q});
        qi.addEventListener('input',function(){ q.q=qi.value; refreshSave(); });
        card.appendChild(qi);
        var ta=el('textarea',{'class':'tm-textarea',rows:'4',placeholder:'答え・規範。**重要語**を太字にすると穴埋めになります',value:q.a});
        var foot=el('div',{'class':'tm-qedit-foot'});
        var countSpan=el('span',{});
        function updFoot(){
          var b=countBlanks(q.a||'');
          clear(foot);
          if(b>0) foot.appendChild(el('span',{'class':'tm-blank-count',text:'穴埋め '+b+' 箇所'}));
          else foot.appendChild(el('span',{'class':'tm-blank-hint',text:'**…** でキーワードを囲むと穴埋めに'}));
          if((q.a||'').trim()){
            var pv=el('span',{'class':'tm-preview-inline'}); appendC(pv,['プレビュー：'].concat(richNodes((q.a||'').split('\n')[0]))); foot.appendChild(pv);
          }
        }
        ta.addEventListener('input',function(){ q.a=ta.value; updFoot(); });
        card.appendChild(ta);
        card.appendChild(foot); updFoot();
        qContainer.appendChild(card);
      });
      qContainer.appendChild(el('button',{'class':'tm-add-q',onclick:function(){ st.qs.push({id:uid(),q:'',a:''}); buildQuestions(); },text:'＋ 問いを追加'}));
      if(initial) qContainer.appendChild(el('button',{'class':'tm-save tm-save-full',onclick:doSave,text:'変更を保存'}));
    }
    buildQuestions(); refreshSave();
    show(page);
  }

  // ---- Recall ----
  var rs;
  function startRecall(ids){
    var memos=ids.map(function(id){ return DATA.memos.filter(function(m){return m.id===id;})[0]; }).filter(Boolean);
    rs={ memos:memos, idx:0, opened:{}, cloze:{}, graded:{}, totalDone:0 };
    renderRecall();
  }
  function renderRecall(){
    if(!rs.memos.length){ show(finish('想起する論点がありません','',true)); return; }
    if(rs.idx>=rs.memos.length){ show(finish('想起、おつかれさまでした', rs.totalDone+' 問を照合しました。ズレた問いは近いうちに再出題されます。',false)); return; }
    var memo=rs.memos[rs.idx];
    var dueQs=memo.questions.filter(isDueQ);
    var qs= dueQs.length?dueQs:memo.questions;
    var allGraded=qs.every(function(q){return rs.graded[q.id];});

    var wrap=el('div',{'class':'tm-recall'});
    wrap.appendChild(el('div',{'class':'tm-recall-bar'},[
      el('button',{'class':'tm-link',onclick:renderHome,text:'✕ 中断'}),
      el('div',{'class':'tm-progress'},[ el('div',{'class':'tm-progress-fill',style:'width:'+(rs.idx/rs.memos.length*100)+'%'}) ]),
      el('span',{'class':'tm-recall-count',text:(rs.idx+1)+'/'+rs.memos.length})
    ]));
    var card=el('div',{'class':'tm-recall-card'});
    card.appendChild(spiral(9));
    if(memo.tag) card.appendChild(el('span',{'class':'tm-chip tm-chip-center',text:memo.tag}));
    card.appendChild(el('h2',{'class':'tm-recall-title',text:memo.title}));
    card.appendChild(el('p',{'class':'tm-recall-instruction',text:'テキストを開かず、頭の中で規範を引き出してから「答えを開く」'}));
    var qsWrap=el('div',{'class':'tm-recall-qs'});
    qs.forEach(function(q,i){
      var tokens=parseTokens(q.a||''); var isOpen=rs.opened[q.id]; var g=rs.graded[q.id];
      var qb=el('div',{'class':'tm-recall-q'+(g?(' graded g-'+g):'')});
      qb.appendChild(el('div',{'class':'tm-recall-qline'},[ el('span',{'class':'tm-recall-qmark',text:'Q'+(i+1)}), el('span',{'class':'tm-recall-qtext',text:q.q}) ]));
      if(!isOpen){
        qb.appendChild(el('button',{'class':'tm-reveal',onclick:function(){ rs.opened[q.id]=true; renderRecall(); },text:'答えを開く'}));
      } else {
        var ans=el('div',{'class':'tm-recall-answer'});
        tokens.forEach(function(t,ti){
          if(t.type==='text'){ ans.appendChild(document.createTextNode(t.value)); }
          else if(rs.cloze[q.id+':'+ti]){ ans.appendChild(el('strong',{'class':'tm-cloze-on',text:t.value})); }
          else {
            var len=Math.min(Math.max(Array.from(t.value).length,2),6);
            ans.appendChild(el('button',{'class':'tm-cloze',onclick:(function(key){return function(){ rs.cloze[key]=true; renderRecall(); };})(q.id+':'+ti),text:Array(len+1).join('⬚')}));
          }
        });
        qb.appendChild(ans);
        if(countBlanks(q.a)>0 && !g){
          qb.appendChild(el('button',{'class':'tm-reveal-keys',onclick:function(){ tokens.forEach(function(t,ti){ if(t.type==='bold') rs.cloze[q.id+':'+ti]=true; }); renderRecall(); },text:'キーワードを全部表示'}));
        }
        if(!g){
          qb.appendChild(el('div',{'class':'tm-qgrade'},[
            el('span',{'class':'tm-qgrade-label',text:'この問いは？'}),
            el('div',{'class':'tm-qgrade-btns'},[
              gradeBtn(memo,q,'fail','✕ 思い出せず'),
              gradeBtn(memo,q,'vague','△ あいまい'),
              gradeBtn(memo,q,'good','○ バッチリ')
            ])
          ]));
        } else {
          var label = g==='good'?'○ バッチリ → 間隔を延長':(g==='vague'?'△ あいまい → 明日また':'✕ 思い出せず → 当日中に再出題');
          qb.appendChild(el('div',{'class':'tm-qresult r-'+g,text:label}));
        }
      }
      qsWrap.appendChild(qb);
    });
    card.appendChild(qsWrap);
    wrap.appendChild(card);
    if(allGraded){
      wrap.appendChild(el('button',{'class':'tm-btn-primary tm-mt',onclick:function(){ rs.opened={}; rs.cloze={}; rs.graded={}; rs.idx+=1; renderRecall(); },text: (rs.idx+1<rs.memos.length)?'次の論点へ →':'想起を完了する ✓'}));
    }
    show(wrap);
  }
  function gradeBtn(memo,q,grade,label){
    return el('button',{'class':'tm-qg '+grade,onclick:function(){
      gradeQuestion(memo.id,q.id,grade); rs.graded[q.id]=grade; rs.totalDone+=1;
      var toks=parseTokens(q.a||''); toks.forEach(function(t,ti){ if(t.type==='bold') rs.cloze[q.id+':'+ti]=true; });
      renderRecall();
    },text:label});
  }

  // ---- Backup (export / import) ----
  function downloadJSON(cb){
    var data=JSON.stringify(DATA,null,2);
    var filename='trigger-memo-backup-'+todayStr()+'.json';
    // iPhone等では共有シート経由が確実（「ファイル」やメモに保存できる）
    try{
      if(typeof File!=='undefined' && navigator.canShare){
        var file=new File([data],filename,{type:'application/json'});
        if(navigator.canShare({files:[file]})){
          navigator.share({files:[file],title:'トリガーメモ バックアップ'}).then(function(){ if(cb)cb('shared'); },function(){ if(cb)cb('cancel'); });
          return;
        }
      }
    }catch(e){}
    // PC等のフォールバック：通常ダウンロード
    try{
      var blob=new Blob([data],{type:'application/json'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a'); a.href=url; a.download=filename;
      document.body.appendChild(a); a.click();
      setTimeout(function(){ URL.revokeObjectURL(url); if(a.parentNode) a.parentNode.removeChild(a); },1500);
      if(cb)cb('download');
    }catch(e){ if(cb)cb('fail'); }
  }
  function importData(text){
    var incoming=JSON.parse(text);
    var memos = (incoming && incoming.memos) ? incoming.memos : (Array.isArray(incoming)?incoming:null);
    if(!memos || !memos.length) throw new Error('no memos');
    var inc=migrate({memos:memos, stats:(incoming&&incoming.stats)?incoming.stats:null});
    var map={}; DATA.memos.forEach(function(m){ map[m.id]=m; });
    var order=DATA.memos.map(function(m){ return m.id; });
    var count=0;
    inc.memos.forEach(function(m){ if(!m.id) m.id=uid(); if(!map[m.id]) order.push(m.id); map[m.id]=m; count++; });
    DATA.memos=order.map(function(id){ return map[id]; });
    if(inc.stats && (inc.stats.totalRecalls||0) > (DATA.stats.totalRecalls||0)) DATA.stats=inc.stats;
    return count;
  }
  function renderBackup(){
    var page=el('div',{'class':'tm-page'});
    page.appendChild(el('header',{'class':'tm-editor-head'},[
      el('button',{'class':'tm-link',onclick:renderHome,text:'← ホーム'}),
      el('span',{'class':'tm-editor-title',text:'バックアップ'}),
      el('span',{})
    ]));
    page.appendChild(el('div',{'class':'tm-hint-box',text:'iPhoneは端末の都合でアプリの保存データが消えることがあります。論点が増えたら、ときどき書き出して安全な場所（メモ・メール・クラウド）に保管してください。'}));

    var json=JSON.stringify(DATA,null,2);
    var exp=el('div',{'class':'tm-backup-sec'});
    exp.appendChild(el('h3',{text:'書き出し（バックアップ）'}));
    exp.appendChild(el('p',{'class':'tm-bulk-desc',text:'下の文字をすべてコピーして保存します。復元時はこれを「読み込み」に貼り付けます。'}));
    var exportArea=el('textarea',{'class':'tm-textarea tm-mono',rows:'6',readonly:'readonly',value:json});
    exp.appendChild(exportArea);
    var copyMsg=el('div',{'class':'tm-blank-hint',style:'margin-top:6px'});
    var copyBtn=el('button',{'class':'tm-save',onclick:function(){
      exportArea.focus(); exportArea.select();
      var ok=function(){ copyMsg.textContent='✓ コピーしました'; };
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(json).then(ok,function(){ try{document.execCommand('copy'); ok();}catch(e){} });
      } else { try{document.execCommand('copy'); ok();}catch(e){} }
    },text:'コピー'});
    var dlBtn=el('button',{'class':'tm-save',onclick:function(){
      downloadJSON(function(r){
        if(r==='shared'||r==='download') copyMsg.textContent='✓ 保存しました';
        else if(r==='fail') copyMsg.textContent='× この端末では「コピー」をお使いください';
      });
    },text:'ファイルに保存／共有'});
    exp.appendChild(el('div',{'class':'tm-backup-row'},[copyBtn,dlBtn]));
    exp.appendChild(copyMsg);
    page.appendChild(exp);

    var imp=el('div',{'class':'tm-backup-sec'});
    imp.appendChild(el('h3',{text:'読み込み（復元・統合）'}));
    imp.appendChild(el('p',{'class':'tm-bulk-desc',text:'バックアップを貼り付けるか、ファイルを選んで読み込みます。同じ論点は上書きし、新しい論点は追加します（既存データは消えません）。'}));
    var importArea=el('textarea',{'class':'tm-textarea tm-mono',rows:'6',placeholder:'ここにバックアップ（書き出した文字）を貼り付け'});
    imp.appendChild(importArea);
    var fileInput=el('input',{type:'file',accept:'application/json,.json,.txt',style:'margin-top:10px;font-size:13px'});
    fileInput.addEventListener('change',function(){ var f=fileInput.files&&fileInput.files[0]; if(!f) return; var rd=new FileReader(); rd.onload=function(){ importArea.value=String(rd.result); }; rd.readAsText(f); });
    imp.appendChild(fileInput);
    var impMsg=el('div',{'class':'tm-split-msg',style:'display:none;margin-top:10px'});
    imp.appendChild(el('button',{'class':'tm-btn-primary tm-mt',onclick:function(){
      var txt=importArea.value.trim(); if(!txt) return;
      try{
        var n=importData(txt); save();
        impMsg.className='tm-split-msg'; impMsg.style.display=''; impMsg.textContent='✓ '+n+' 論点を読み込みました。ホームに戻ります…';
        setTimeout(renderHome,800);
      }catch(e){
        impMsg.className='tm-split-msg err'; impMsg.style.display=''; impMsg.textContent='× 読み込めませんでした。バックアップの全文が正しく貼られているか確認してください。';
      }
    },text:'読み込む（統合）'}));
    imp.appendChild(impMsg);
    page.appendChild(imp);
    show(page);
  }

  // init
  load();
  renderHome();
})();

</script>
</body>
</html>
